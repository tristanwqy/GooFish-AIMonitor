name: release

# 打 tag(v*) 触发: 在 macOS(arm64+Intel) 与 Windows runner 上各自构建桌面包,
# 自带 Chromium、做拉起冒烟测试, 最后汇总发到 GitHub Release。
on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      version:
        description: "版本号(如 0.1.0),手动触发用"
        default: "0.0.0-dev"

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14       # Apple Silicon(仅此, 不出 Intel 版)
            label: macos-arm64
          - os: windows-latest # x64
            label: windows-x64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: 解析版本号
        id: ver
        shell: bash
        run: |
          v="${{ github.ref_name }}"; v="${v#v}"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then v="${{ github.event.inputs.version }}"; fi
          echo "version=$v" >> "$GITHUB_OUTPUT"

      - name: 安装 Python 依赖
        run: |
          python -m pip install -U pip
          pip install -e . pyinstaller

      - name: 构建前端
        working-directory: frontend
        run: |
          npm ci
          npm run build

      - name: 下载 Playwright Chromium
        run: python -m playwright install chromium

      - name: PyInstaller 打包
        run: python -m PyInstaller packaging/goofish.spec --noconfirm --distpath dist --workpath build

      - name: 打包 macOS (.dmg)
        if: runner.os == 'macOS'
        run: |
          python packaging/copy_browsers.py "dist/GooFish-AIMonitor.app/Contents/Resources/ms-playwright"
          "dist/GooFish-AIMonitor.app/Contents/MacOS/GooFish-AIMonitor" --selfcheck
          hdiutil create -volname "GooFish-AIMonitor" \
            -srcfolder "dist/GooFish-AIMonitor.app" -ov -format UDZO \
            "GooFish-AIMonitor-${{ matrix.label }}-${{ steps.ver.outputs.version }}.dmg"

      - name: 安装 Inno Setup (Windows)
        if: runner.os == 'Windows'
        run: choco install innosetup --no-progress -y

      - name: 打包 Windows (.exe 安装程序)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          python packaging/copy_browsers.py "dist/GooFish-AIMonitor/ms-playwright"
          if ($LASTEXITCODE -ne 0) { throw "copy_browsers failed" }
          & "dist/GooFish-AIMonitor/GooFish-AIMonitor.exe" --selfcheck
          if ($LASTEXITCODE -ne 0) { throw "selfcheck failed" }
          & "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe" "/DMyAppVersion=${{ steps.ver.outputs.version }}" packaging\goofish.iss
          if ($LASTEXITCODE -ne 0) { throw "ISCC failed" }

      - name: 上传产物
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.label }}
          path: |
            *.dmg
            packaging/Output/*.exe
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/checkout@v4   # 取 docs/release-notes.md 供 body_path 用
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: 发布 Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          body_path: docs/release-notes.md
